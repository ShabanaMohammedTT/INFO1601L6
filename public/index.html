<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <title>Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  </head>

  <body>
    <nav>
        <div class="nav-wrapper teal" style="padding-left: 10px;">
           <a href="#!" class="brand-logo">Ajax Demo</a>
        </div>
    </nav>

    <main class="row" style="padding: 40px">
         <table>
           <thead>
                <tr>
                   <th>#</th>
                   <th>Name</th>
                   <th>Type</th>
                   <th>Website</th>
                </tr>
           </thead>

           <tbody id="result">
           </tbody>

         </table>
     </main>

     <script>

     //function MUST be declared async
     async function getData(url){
        try{
          let response = await fetch(url); //1. send request
          let result = await response.json(); //2. convert to JSON
          drawTable(result); //3. send data to table
       }catch(e){
           console.log(e); //catch errors
       }
     }

     function drawTable(data){
        let result = document.querySelector("#result");
        let html = "";

        data.forEach((brewery, index) => {
           html += `
             <tr>
               <td>${index + 1}</td>
               <td>${brewery.name}</td>
               <td>${brewery.brewery_type}</td>
               <td><a href="${brewery.website_url}" target="_blank">${brewery.website_url}</a></td>
             </tr>
           `;
        });

        result.innerHTML = html;
     }

     //call the API
     getData("https://api.openbrewerydb.org/breweries/search?query=harry");

     </script>

  </body>
</html>
